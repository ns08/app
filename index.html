<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>チャット＆電話ソフト</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .tab-content { display: none; height: calc(100vh - 80px); flex-direction: column; }
        .tab-content.active { display: flex; }
        .dial-key { transition: all 0.1s; cursor: pointer; }
        .dial-key:active { background-color: #f1f5f9; transform: scale(0.9); }
        
        #setupOverlay { 
            position: fixed; inset: 0; background: white; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #setupOverlay.hidden { display: none !important; }

        .id-card { background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); border: 2px solid #bfdbfe; }
        .msg-left { align-self: flex-start; background: #f3f4f6; border-radius: 1.2rem 1.2rem 1.2rem 0.2rem; }
        .msg-right { align-self: flex-end; background: #2563eb; color: white; border-radius: 1.2rem 1.2rem 0.2rem 1.2rem; }
    </style>
</head>
<body class="bg-white text-slate-900 font-sans h-screen flex flex-col">

    <!-- セットアップ画面 -->
    <div id="setupOverlay">
        <div class="w-20 h-20 bg-blue-600 rounded-[2rem] flex items-center justify-center text-white mb-6 shadow-xl">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"></path></svg>
        </div>
        <h2 class="text-2xl font-black mb-2">ユーザー登録</h2>
        <p class="text-sm text-gray-500 mb-8 px-6 text-center">お名前を入力して開始しましょう。</p>
        <div class="w-full max-w-xs space-y-4 px-6">
            <input id="setupUserName" type="text" placeholder="お名前" class="w-full px-6 py-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 ring-blue-500 font-bold text-center">
            <button id="btnCompleteSetup" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">登録して開始</button>
        </div>
        <a href="privacy_policy.md" target="_blank" class="mt-6 text-xs text-blue-500 underline">プライバシーポリシーを確認</a>
    </div>

    <!-- メインコンテンツ -->
    <main class="flex-1 overflow-hidden relative">
        
        <!-- ダイヤルタブ -->
        <section id="tab-dialer" class="tab-content active p-6">
            <div class="flex-1 flex flex-col justify-center items-center">
                <div class="mb-8 text-center">
                    <p class="text-[10px] font-bold text-blue-500 uppercase tracking-widest mb-2">発信先のIDを入力</p>
                    <div id="dialDisplay" class="text-4xl font-mono font-black text-slate-800 tracking-tighter h-12"></div>
                </div>
                <div class="grid grid-cols-3 gap-4 mb-8 w-full max-w-[240px]" id="keypad">
                    <button class="dial-key w-14 h-14 rounded-full bg-gray-50 text-xl font-bold flex items-center justify-center" data-val="1">1</button>
                    <button class="dial-key w-14 h-14 rounded-full bg-gray-50 text-xl font-bold flex items-center justify-center" data-val="2">2</button>
                    <button class="dial-key w-14 h-14 rounded-full bg-gray-50 text-xl font-bold flex items-center justify-center" data-val="3">3</button>
                    <button class="dial-key w-14 h-14 rounded-full bg-gray-50 text-xl font-bold flex items-center justify-center" data-val="4">4</button>
                    <button class="dial-key w-14 h-14 rounded-full bg-gray-50 text-xl font-bold flex items-center justify-center" data-val="5">5</button>
                    <button class="dial-key w-14 h-14 rounded-full bg-gray-50 text-xl font-bold flex items-center justify-center" data-val="6">6</button>
                    <button class="dial-key w-14 h-14 rounded-full bg-gray-50 text-xl font-bold flex items-center justify-center" data-val="7">7</button>
                    <button class="dial-key w-14 h-14 rounded-full bg-gray-50 text-xl font-bold flex items-center justify-center" data-val="8">8</button>
                    <button class="dial-key w-14 h-14 rounded-full bg-gray-50 text-xl font-bold flex items-center justify-center" data-val="9">9</button>
                    <button class="dial-key w-14 h-14 rounded-full bg-gray-50 text-xl font-bold flex items-center justify-center" data-val="*">*</button>
                    <button class="dial-key w-14 h-14 rounded-full bg-gray-50 text-xl font-bold flex items-center justify-center" data-val="0">0</button>
                    <button class="dial-key w-14 h-14 rounded-full bg-gray-50 text-xl font-bold flex items-center justify-center" data-val="#">#</button>
                </div>
                <div class="flex items-center gap-6">
                    <button id="btnDeleteDial" class="w-14 h-14 text-gray-300 flex items-center justify-center"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z" stroke-width="2"></path></svg></button>
                    <button id="btnCall" class="w-16 h-16 bg-green-500 text-white rounded-full flex items-center justify-center shadow-lg active:scale-90 transition"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" stroke-width="2"></path></svg></button>
                    <div class="w-14 h-14"></div>
                </div>
            </div>
            <div class="mt-4 w-full max-w-sm mx-auto">
                <div class="id-card rounded-3xl p-4 shadow-sm text-center">
                    <p id="myNameLabel" class="text-sm font-bold text-slate-700 mb-1"></p>
                    <p id="myIdText" class="text-3xl font-mono font-black text-blue-700 tracking-[0.2em]">------</p>
                    <button id="btnCopyId" class="mt-2 text-[10px] text-blue-500 font-bold uppercase underline">IDをコピー</button>
                </div>
            </div>
        </section>

        <!-- メッセージタブ -->
        <section id="tab-messages" class="tab-content">
            <div class="p-6 flex flex-col h-full">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black">チャット</h2>
                    <button id="btnNewGroup" class="p-2 bg-blue-100 text-blue-600 rounded-xl text-xs font-bold active:scale-95 transition">＋ グループ作成</button>
                </div>
                <div id="chatList" class="flex-1 overflow-y-auto space-y-4">
                    <p class="text-center text-gray-400 text-sm mt-10">チャットを読み込み中...</p>
                </div>
            </div>
        </section>

        <!-- チャット詳細画面 -->
        <section id="chatRoom" class="fixed inset-0 bg-white z-[100] hidden flex flex-col">
            <div class="p-4 border-b flex items-center gap-4 bg-white">
                <button id="btnBackToChats" class="p-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2.5"></path></svg></button>
                <div>
                    <p id="roomTitle" class="font-bold text-lg leading-tight truncate max-w-[200px]">Room Name</p>
                    <p id="roomSub" class="text-[10px] text-gray-400 font-mono"></p>
                </div>
            </div>
            <div id="messagesContainer" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 bg-slate-50"></div>
            <div class="p-4 border-t flex gap-2 items-end bg-white">
                <textarea id="msgInput" rows="1" placeholder="メッセージを入力..." class="flex-1 bg-gray-100 rounded-2xl px-4 py-3 outline-none resize-none text-sm"></textarea>
                <button id="btnSendMsg" class="w-12 h-12 bg-blue-600 text-white rounded-2xl flex items-center justify-center shrink-0 shadow-lg"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3"></path></svg></button>
            </div>
        </section>

    </main>

    <!-- ナビゲーション -->
    <nav class="h-20 bg-white border-t flex items-center justify-around px-6">
        <button class="nav-btn flex flex-col items-center gap-1 text-blue-600" data-tab="dialer">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" stroke-width="2"></path></svg>
            <span class="text-[10px] font-black uppercase">ダイヤル</span>
        </button>
        <button class="nav-btn flex flex-col items-center gap-1 text-gray-300" data-tab="messages">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" stroke-width="2"></path></svg>
            <span class="text-[10px] font-black uppercase">チャット</span>
        </button>
    </nav>

    <div id="copyToast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-2 rounded-full text-xs font-bold opacity-0 transition-opacity pointer-events-none z-[10000]">IDをコピーしました</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'unified-dialer-chat';

        let myId = localStorage.getItem('app_dialer_id') || Math.floor(10000000 + Math.random() * 89999999).toString();
        let myName = localStorage.getItem('app_dialer_name');
        let currentUser = null;
        let activeRoomId = null;

        const overlay = document.getElementById('setupOverlay');
        const myIdText = document.getElementById('myIdText');
        const myNameLabel = document.getElementById('myNameLabel');
        const dialDisplay = document.getElementById('dialDisplay');
        const chatList = document.getElementById('chatList');
        const chatRoom = document.getElementById('chatRoom');
        const messagesContainer = document.getElementById('messagesContainer');

        myIdText.innerText = myId;
        if (myName) {
            overlay.classList.add('hidden');
            myNameLabel.innerText = myName;
        }

        // Firebase Auth
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                if (myName) syncUser();
                listenToRooms();
            } else {
                signInAnonymously(auth);
            }
        });

        async function syncUser() {
            if (!currentUser || !myName) return;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', myId), {
                id: myId, name: myName, lastActive: serverTimestamp()
            }, { merge: true });
        }

        document.getElementById('btnCompleteSetup').onclick = () => {
            const val = document.getElementById('setupUserName').value.trim();
            if (!val) return;
            myName = val;
            localStorage.setItem('app_dialer_name', myName);
            localStorage.setItem('app_dialer_id', myId);
            myNameLabel.innerText = myName;
            overlay.classList.add('hidden');
            syncUser();
        };

        // UI Logic
        document.getElementById('btnCopyId').onclick = () => {
            const el = document.createElement('textarea');
            el.value = myId; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            const t = document.getElementById('copyToast'); t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 2000);
        };

        let dialStr = "";
        document.getElementById('keypad').onclick = (e) => {
            const btn = e.target.closest('.dial-key');
            if (!btn) return;
            dialStr += btn.dataset.val; dialDisplay.innerText = dialStr;
        };
        document.getElementById('btnDeleteDial').onclick = () => { dialStr = dialStr.slice(0, -1); dialDisplay.innerText = dialStr; };

        // チャット開始 (発信)
        document.getElementById('btnCall').onclick = async () => {
            if (!currentUser || dialStr.length < 8) return;
            const targetId = dialStr;
            if (targetId === myId) return;

            const roomId = [myId, targetId].sort().join('_');
            const targetDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', targetId));
            const targetName = targetDoc.exists() ? targetDoc.data().name : `User ${targetId}`;

            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId), {
                type: 'private', members: [myId, targetId],
                memberNames: { [myId]: myName, [targetId]: targetName },
                updatedAt: serverTimestamp()
            }, { merge: true });

            openChat(roomId, targetName, `ID: ${targetId}`);
        };

        // グループ作成
        document.getElementById('btnNewGroup').addEventListener('click', async () => {
            if (!currentUser) return;
            const name = prompt("グループ名:");
            if (!name) return;
            const rid = 'group_' + Date.now();
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', rid), {
                type: 'group', name: name, members: [myId], updatedAt: serverTimestamp(), createdBy: myId
            });
            openChat(rid, name, "グループ");
        });

        // ルーム一覧
        function listenToRooms() {
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'rooms'));
            onSnapshot(q, (ss) => {
                chatList.innerHTML = '';
                const rooms = [];
                ss.forEach(d => { if (d.data().members?.includes(myId)) rooms.push({id: d.id, ...d.data()}); });
                rooms.sort((a,b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0));

                if (!rooms.length) { chatList.innerHTML = '<p class="text-center text-gray-400 text-sm mt-10">チャットがありません</p>'; return; }
                
                rooms.forEach(room => {
                    const div = document.createElement('div');
                    div.className = "p-4 bg-gray-50 rounded-2xl flex items-center gap-4 active:scale-95 transition cursor-pointer";
                    let title = room.name || "ルーム";
                    if (room.type === 'private') {
                        const otherId = room.members.find(m => m !== myId);
                        title = room.memberNames?.[otherId] || `User ${otherId}`;
                    }
                    div.innerHTML = `<div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold">${title[0]}</div>
                        <div class="flex-1 overflow-hidden"><p class="font-bold truncate">${title}</p><p class="text-[10px] text-gray-400">${room.type}</p></div>`;
                    div.onclick = () => openChat(room.id, title, room.type);
                    chatList.appendChild(div);
                });
            });
        }

        let msgUnsub = null;
        function openChat(rid, title, sub) {
            activeRoomId = rid; chatRoom.classList.remove('hidden');
            document.getElementById('roomTitle').innerText = title;
            document.getElementById('roomSub').innerText = sub;
            if (msgUnsub) msgUnsub();
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'rooms', rid, 'messages'));
            msgUnsub = onSnapshot(q, (ss) => {
                const msgs = []; ss.forEach(d => msgs.push(d.data()));
                msgs.sort((a,b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
                messagesContainer.innerHTML = '';
                msgs.forEach(m => {
                    const isMe = m.senderId === myId;
                    const wrap = document.createElement('div');
                    wrap.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} w-full`;
                    wrap.innerHTML = `<div class="max-w-[80%] px-4 py-2 text-sm ${isMe ? 'msg-right' : 'msg-left'}">${m.text}</div>`;
                    messagesContainer.appendChild(wrap);
                });
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
        }

        async function send() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !activeRoomId) return;
            input.value = '';
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'rooms', activeRoomId, 'messages'), {
                text, senderId: myId, senderName: myName, createdAt: serverTimestamp()
            });
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', activeRoomId), { updatedAt: serverTimestamp() }, { merge: true });
        }

        document.getElementById('btnSendMsg').onclick = send;
        document.getElementById('btnBackToChats').onclick = () => { chatRoom.classList.add('hidden'); if(msgUnsub) msgUnsub(); };
        document.querySelectorAll('.nav-btn').forEach(b => b.onclick = () => {
            const tab = b.dataset.tab;
            document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === `tab-${tab}`));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('text-blue-600', btn === b));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('text-gray-300', btn !== b));
        });
    </script>
</body>
</html>
